name: Build All-Files Installer

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'App Version (e.g., 1.0.0)'
        required: true
        default: '1.0.0'

permissions:
  contents: write  # Required for pushing tags

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Create Git Tag (Windows Compatible)
      shell: pwsh
      run: |
        $version = "${{ github.event.inputs.version }}"
        $tagName = "v$version"
        
        git config user.name "GitHub Actions"
        git config user.email "github-actions@users.noreply.github.com"
        
        if (git tag --list $tagName) {
            Write-Host "⚠️ Tag $tagName already exists. Skipping."
        } else {
            Write-Host "🏷️ Creating tag $tagName..."
            git tag -a $tagName -m "Release version $version"
            git push origin $tagName
        }

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      shell: pwsh
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        if (Test-Path requirements.txt) { pip install -r requirements.txt }

    - name: Build EXE (Single Entry Point)
      shell: pwsh
      run: |
        $outputDir = "./raw_exe"
        New-Item -ItemType Directory -Path $outputDir -Force | Out-Null
        
        # Add --hidden-import if launcher.py uses subprocess or importlib to call the other files
        $hiddenImports = "--hidden-import=gamebot --hidden-import=gamebot_multiplayer_server"
        
        Write-Host "🔨 Building main.exe..."
        pyinstaller --onefile --distpath $outputDir --name main $hiddenImports launcher.py
        
        Remove-Item -Path "./build", "./main.spec" -Recurse -Force -ErrorAction SilentlyContinue     

    - name: Prepare Installer Source
      shell: pwsh
      run: |
        $targetDir = "./installer_source"
        New-Item -ItemType Directory -Path $targetDir -Force | Out-Null

        # 1. Move generated EXEs
        if (Test-Path "./raw_exe") {
            Get-ChildItem -Path "./raw_exe" -File | Move-Item -Destination $targetDir -Force
        }

        # 2. Copy all other project files (excluding build artifacts)
        $excludeList = @('.git', '.github', 'raw_exe', 'dist', 'installer_source', '__pycache__', '.venv', 'venv')
        Get-ChildItem -Path . -Exclude $excludeList | ForEach-Object {
            Copy-Item -Path $_.FullName -Destination $targetDir -Recurse -Force
        }

        # 3. Verify Inno Setup Script exists
        if (-not (Test-Path "setup_script.iss")) {
            Write-Error "❌ Error: setup_script.iss not found!"
            exit 1
        }

    - name: Compile Windows Installer
      uses: Minionguyjpro/Inno-Setup-Action@v1.2.2
      with:
        path: ./installer_source/setup_script.iss
        options: /O+ /dAppVersion=${{ github.event.inputs.version }} /F"MyApp_Installer" /O"../dist"

    - name: Upload Installer Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Windows-Installer-${{ github.event.inputs.version }}
        path: dist/MyApp_Installer.exe
        retention-days: 30   
