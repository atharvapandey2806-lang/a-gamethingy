name: Build All-Files Installer

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'App Version (e.g., 1.0.0)'
        required: true
        default: '1.0.0'

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Fetch all history for tags
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Create Git Tag
      uses: rickstaa/action-create-tag@v1
      with:
        tag: "v${{ github.event.inputs.version }}"
        message: "Release version ${{ github.event.inputs.version }}"
        force_push_tag: false
        tag_exists_error: false  # Don't fail if tag already exists

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      shell: pwsh
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        if (Test-Path requirements.txt) { pip install -r requirements.txt }

    - name: Build EXEs for All Python Files
      shell: pwsh
      run: |
        $outputDir = "./raw_exe"
        New-Item -ItemType Directory -Path $outputDir -Force | Out-Null
        
        Get-ChildItem -Path . -Filter *.py -File | ForEach-Object {
          $name = $_.BaseName
          Write-Host "🔨 Building $name..."
          Remove-Item -Path "$outputDir/$name.exe" -ErrorAction SilentlyContinue
          pyinstaller --onefile --distpath $outputDir --name $name $_.Name
          Remove-Item -Path "./build", "./$name.spec" -Recurse -Force -ErrorAction SilentlyContinue
        }

    - name: Prepare Installer Source
      shell: pwsh
      run: |
        $targetDir = "./installer_source"
        New-Item -ItemType Directory -Path $targetDir -Force | Out-Null

        if (Test-Path "./raw_exe") {
            Get-ChildItem -Path "./raw_exe" -File | Move-Item -Destination $targetDir -Force
        }

        $excludeList = @('.git', '.github', 'raw_exe', 'dist', 'installer_source', '__pycache__', '.venv', 'venv')
        Get-ChildItem -Path . -Exclude $excludeList | ForEach-Object {
            Copy-Item -Path $_.FullName -Destination $targetDir -Recurse -Force
        }

        if (-not (Test-Path "setup_script.iss")) {
            Write-Error "❌ Error: setup_script.iss not found!"
            exit 1
        }

    - name: Compile Windows Installer
      uses: Minionguyjpro/Inno-Setup-Action@v1.2.2
      with:
        path: ./installer_source/setup_script.iss
        options: /O+ /dAppVersion=${{ github.event.inputs.version }} /F"MyApp_Installer" /O"../dist"

    - name: Upload Installer Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Windows-Installer-${{ github.event.inputs.version }}
        path: dist/MyApp_Installer.exe   
