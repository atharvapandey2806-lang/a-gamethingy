    - name: Prepare Assets for Installer
      shell: pwsh
      run: |
        mkdir installer_source -ErrorAction SilentlyContinue

        # Move the newly created EXEs
        if (Test-Path ./raw_exe) {
            Move-Item -Path ./raw_exe/* -Destination ./installer_source/ -Force
        }

        # Move EVERYTHING else (code, assets, html, bat, ps1)
        # Excludes system/build folders
        Get-ChildItem -Path . -Exclude .git, .github, raw_exe, dist, installer_source | 
          Move-Item -Destination ./installer_source/ -Force

        # Copy the ISS script
        Copy-Item -Path setup_script.iss -Destination ./installer_source/

        Write-Host "=== Ready to build standard installer ==="
        Get-ChildItem -Path ./installer_source | Select-Object Name   
